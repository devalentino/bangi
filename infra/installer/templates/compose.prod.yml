services:
  web:
    image: ghcr.io/devalentino/bangi-web:0.0.1a18
    restart: always
    env_file:
      - /opt/bangi/shared/env/.env
    ports:
      - '127.0.0.1:8080:80'
    networks:
      - bangi

  api:
    image: ghcr.io/devalentino/bangi-api:0.0.1a18
    restart: always
    env_file:
      - /opt/bangi/shared/env/.env
    environment:
      MARIADB_HOST: mariadb
      INTERNAL_PROCESS_BASE_URL: http://localhost:8000/process
      BANGI_HOST_OPS_SSH_USER: bangi-ops
      BANGI_HOST_OPS_SSH_HOST: host.docker.internal
      BANGI_HOST_OPS_SSH_KEY_PATH: /run/secrets/bangi_ops_ssh_key
      BANGI_HOST_OPS_SSH_KNOWN_HOSTS_PATH: /run/secrets/bangi_ops_known_hosts
    ports:
      - '127.0.0.1:8000:5000'
    volumes:
      - /opt/bangi/shared/landings:/opt/bangi/shared/landings
      - /opt/bangi/shared/ip2location:/opt/bangi/shared/ip2location:ro
    secrets:
      - source: bangi_ops_ssh_key
        target: bangi_ops_ssh_key
        mode: 0400
      - source: bangi_ops_known_hosts
        target: bangi_ops_known_hosts
        mode: 0444
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://0.0.0.0:5000/api/v2/health" ]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - bangi

  mariadb:
    image: mariadb:latest
    restart: always
    mem_limit: 160m
    mem_reservation: 128m
    env_file:
      - /opt/bangi/shared/env/.env
    volumes:
      - /opt/bangi/shared/mariadb:/var/lib/mysql
      - ./infra/mariadb/low-memory.cnf:/etc/mysql/conf.d/zzz-low-memory.cnf:ro
    healthcheck:
      test: [ 'CMD-SHELL', 'mariadb -u root -p"$$MARIADB_ROOT_PASSWORD" -e "SHOW DATABASES"' ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s
    networks:
      - bangi

  landing-renderer:
    image: php:8-apache
    mem_limit: 64m
    mem_reservation: 32m
    env_file:
      - /opt/bangi/shared/env/.env
    volumes:
      - /opt/bangi/shared/landings:/var/www/html/landings
    networks:
      - bangi

networks:
  bangi:
    driver: bridge

secrets:
  bangi_ops_ssh_key:
    file: /etc/bangi/ops/ssh/id_ed25519
  bangi_ops_known_hosts:
    file: /etc/bangi/ops/ssh/known_hosts
