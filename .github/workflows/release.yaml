name: Release

on:
  push:
    branches:
      - master
    paths:
      - infra/installer/install.sh
      - infra/installer/templates/compose.prod.yml

permissions:
  contents: write
  packages: write

jobs:
  release-tag:
    name: Create release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Read release tag
        id: version
        run: |
          set -euo pipefail

          release_tag="$(sed -n 's/^BANGI_RELEASE_TAG="\([^"]*\)"$/\1/p' infra/installer/install.sh)"

          if [[ -z "${release_tag}" ]]; then
            echo "BANGI_RELEASE_TAG is missing from infra/installer/install.sh" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
            echo "Release tag ${release_tag} already exists" >&2
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create release tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.release_tag }}" "${{ github.sha }}"
          git push origin "${{ steps.version.outputs.release_tag }}"

  publish-api:
    name: Publish API image
    needs: release-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: ghcr.io/devalentino/bangi-api:${{ needs.release-tag.outputs.release_tag }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}

  publish-web:
    name: Publish web image
    needs: release-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ghcr.io/devalentino/bangi-web:${{ needs.release-tag.outputs.release_tag }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
