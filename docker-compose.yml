services:
  mariadb:
    image: mariadb:latest
    restart: always
    mem_limit: 160m
    mem_reservation: 128m
    env_file:
      - ./.env
    ports:
      - '3306:3306'
    volumes:
      - ./infra/mariadb/low-memory.cnf:/etc/mysql/conf.d/zzz-low-memory.cnf:ro
    healthcheck:
      test: [ 'CMD-SHELL', 'mariadb -u root -p"$$MARIADB_ROOT_PASSWORD" -e "SHOW DATABASES"' ]
      interval: 5s
      timeout: 5s
      retries: 3
  landing-renderer:
    image: php:8-apache
    mem_limit: 64m
    mem_reservation: 32m
    volumes:
      - ./landings:/var/www/html/landings
  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    mem_limit: 160m
    mem_reservation: 128m
    env_file:
      - ./.env
    environment:
      MARIADB_HOST: mariadb
      LANDING_PAGES_BASE_PATH: /app/landings
      INTERNAL_PROCESS_BASE_URL: http://localhost:8000/process
    ports:
      - '8000:5000'
    volumes:
      - ./apps/api/src:/app/src
      - ./.env:/app/.env
      - ./landings:/app/landings
      - ./infra/IP2LOCATION-LITE-DB1.IPV6.BIN:/app/IP2LOCATION-LITE-DB1.IPV6.BIN
    links:
      - mariadb
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://0.0.0.0:5000/api/v2/health" ]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 120s
